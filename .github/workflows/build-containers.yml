---
name: "Build Containers"

on:
  workflow_dispatch:
  push:
    tags:
      - '*'
    branches:
      - main

jobs:
  build-containers-common:
    runs-on: ubuntu-latest
    outputs:
      containerver: ${{ steps.getcontainerver.outputs.containerver }}
      image: ${{ steps.getcontainerver.outputs.image }}
    steps:
      - name: Get Container Version
        id: getcontainerver
        run: |
          echo "containerver=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          echo "image=ghcr.io/${{ github.repository_owner }}/postlaa-app" >> "$GITHUB_OUTPUT"

  build-containers:
    needs: build-containers-common
    strategy:
      matrix:
        include:
          - runnertags: ubuntu-latest
            arch: amd64
    runs-on: ${{ matrix.runnertags }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ghcr
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and Push Image
        env:
          CONTAINERVER: ${{ needs.build-containers-common.outputs.containerver }}
          IMAGE: ${{ needs.build-containers-common.outputs.image }}
          NEXT_PUBLIC_VERSION: ${{ github.ref_name }}
        run: |
          docker buildx build --platform linux/${{ matrix.arch }} \
            -f Dockerfile.dev \
            -t ${{ env.IMAGE }}:${{ env.CONTAINERVER }}-${{ matrix.arch }} \
            -t ${{ env.IMAGE }}:latest \
            --build-arg NEXT_PUBLIC_VERSION=${{ env.NEXT_PUBLIC_VERSION }} \
            --pull \
            --no-cache \
            --provenance=false --sbom=false \
            --push .

  build-container-manifest:
    needs: [build-containers, build-containers-common]
    runs-on: ubuntu-latest
    steps:
      - name: Login to ghcr
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Tag latest
        env:
          IMAGE: ${{ needs.build-containers-common.outputs.image }}
          CONTAINERVER: ${{ needs.build-containers-common.outputs.containerver }}
        run: |
          docker buildx imagetools inspect ${{ env.IMAGE }}:latest
          echo "Image pushed as ${{ env.IMAGE }}:latest"

      - name: Verify Manifest
        run: |
          docker manifest inspect ghcr.io/gitroomhq/postiz-app:latest
